server.port=8081
basyx.environment=file:aas
basyx.backend=InMemory

basyx.cors.allowed-origins=*
basyx.cors.allowed-methods=GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD
basyx.aasrepository.feature.registryintegration=http://aas-registry:8080
basyx.aasrepository.feature.discoveryintegration=http://aas-discovery:8081
basyx.submodelrepository.feature.registryintegration=http://sm-registry:8080
basyx.externalurl=http://aasenv.basyx.localhost

basyx.feature.authorization.enabled = false
basyx.aasenvironment.authorization.preconfiguration.token-endpoint=http://keycloak.basyx.localhost/realms/BaSyx/protocol/openid-connect/token
spring.servlet.multipart.max-request-size=128MB
spring.servlet.multipart.max-file-size=128MB

basyx.aasrepository.feature.registryintegration.authorization.enabled=false

basyx.aasrepository.feature.discoveryintegration.authorization.enabled=false

basyx.submodelrepository.feature.registryintegration.authorization.enabled=false

